name: Android

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

jobs:
  build:
    name: APK (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            rust-target: aarch64-linux-android
          - abi: armeabi-v7a
            rust-target: armv7-linux-androideabi
          - abi: x86_64
            rust-target: x86_64-linux-android
          - abi: x86
            rust-target: i686-linux-android
    env:
      CARGO_TERM_COLOR: always
      ANDROID_NDK_VERSION: 29.0.14033849
    defaults:
      run:
        working-directory: yamu-android

    steps:
      - name: Check out Yamu Downloader
        uses: actions/checkout@v7
        with:
          path: yamu-android
          fetch-depth: 0

      - name: Read pinned FFmpeg revision
        id: revisions
        run: |
          ffmpeg_revision="$(tr -d '[:space:]' < vendor/ffmpeg-sys-next/FFMPEG_REVISION)"
          if [[ ! "$ffmpeg_revision" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid pinned FFmpeg revision: $ffmpeg_revision" >&2
            exit 1
          fi
          echo "ffmpeg=$ffmpeg_revision" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android platform and NDK
        run: |
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager \
            "platforms;android-37.0" \
            "build-tools;36.1.0-rc1" \
            "ndk;$ANDROID_NDK_VERSION"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION" >> "$GITHUB_ENV"

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf automake clang cmake libtool make nasm pkg-config unzip

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install cargo-ndk
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk@4.1.2

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            yamu-android/native/target
          key: cargo-android-${{ runner.os }}-${{ matrix.abi }}-${{ hashFiles('yamu-android/native/Cargo.lock', 'yamu-android/vendor/ffmpeg-sys-next/FFMPEG_REVISION') }}
          restore-keys: cargo-android-${{ runner.os }}-${{ matrix.abi }}-

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Set up signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          signing_dir="$RUNNER_TEMP/yamu-signing"
          keystore_path="$signing_dir/release.jks"
          mkdir -p "$signing_dir"

          if [ -n "$KEYSTORE_BASE64" ]; then
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          elif [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "Release signing secrets are required for tag builds" >&2
            exit 1
          else
            echo "Signing secrets are unavailable; generating an ephemeral CI key"
            KEYSTORE_PASSWORD=ephemeral
            KEY_ALIAS=ephemeral
            keytool -genkeypair \
              -keystore "$keystore_path" \
              -storepass "$KEYSTORE_PASSWORD" \
              -keypass "$KEYSTORE_PASSWORD" \
              -alias "$KEY_ALIAS" \
              -keyalg RSA -keysize 4096 -validity 30 \
              -dname "CN=yamu-ci, O=Yamu"
          fi
          chmod 600 "$keystore_path"
          {
            printf 'password=%s\n' "$KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'storeFile=%s\n' "$keystore_path"
          } > keystore.properties

      - name: Build signed APK
        id: build
        env:
          ABI: ${{ matrix.abi }}
          FFMPEG_REVISION: ${{ steps.revisions.outputs.ffmpeg }}
        run: |
          label="${GITHUB_SHA::7}"
          gradle_args=(":app:assembleRelease" "-Pyamu.abi=$ABI")
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            label="${GITHUB_REF_NAME#v}"
            gradle_args+=("-Pyamu.versionName=$label")
          fi

          ./gradlew "${gradle_args[@]}"

          apk="$(find app/build/outputs/apk/release -maxdepth 1 -type f \
            -name "*-$ABI-release.apk" -print -quit)"
          if [ -z "$apk" ]; then
            echo "No release APK found for $ABI" >&2
            find app/build/outputs/apk -type f -name '*.apk' -print >&2
            exit 1
          fi
          output="$GITHUB_WORKSPACE/yamu-downloader-$label-$ABI.apk"
          cp "$apk" "$output"

          config_mak=""
          while IFS= read -r candidate; do
            source_dir="${candidate%/ffbuild/config.mak}"
            actual_revision="$(git -C "$source_dir" rev-parse HEAD)"
            if [ "$actual_revision" = "$FFMPEG_REVISION" ]; then
              config_mak="$candidate"
              break
            fi
          done < <(find "$GITHUB_WORKSPACE" -path '*/ffmpeg-8.1/ffbuild/config.mak' -type f)
          if [ -z "$config_mak" ]; then
            echo "No FFmpeg build for pinned revision $FFMPEG_REVISION" >&2
            exit 1
          fi

          configuration="$(grep '^FFMPEG_CONFIGURATION=' "$config_mak")"
          for flag in \
            --disable-gpl --disable-version3 --disable-nonfree \
            --enable-static --disable-shared --enable-libmp3lame; do
            if [[ "$configuration" != *"$flag"* ]]; then
              echo "Required FFmpeg configure flag is missing: $flag" >&2
              exit 1
            fi
          done

          ffmpeg_config="$GITHUB_WORKSPACE/ffmpeg-config-$ABI.txt"
          {
            printf 'ANDROID_ABI=%s\n' "$ABI"
            printf 'FFMPEG_REVISION=%s\n' "$FFMPEG_REVISION"
            grep -E '^(FFMPEG_CONFIGURATION|CC_IDENT|ARCH|CFLAGS|LDFLAGS|EXTRALIBS)=' \
              "$config_mak"
          } > "$ffmpeg_config"
          echo "apk=$output" >> "$GITHUB_OUTPUT"
          echo "ffmpeg_config=$ffmpeg_config" >> "$GITHUB_OUTPUT"

      - name: Verify APK architecture and signature
        env:
          ABI: ${{ matrix.abi }}
          APK: ${{ steps.build.outputs.apk }}
        run: |
          native_entries="$(zipinfo -1 "$APK" | grep '^lib/.*/libyamu_native\.so$')"
          expected="lib/$ABI/libyamu_native.so"
          if [ "$native_entries" != "$expected" ]; then
            echo "Expected only $expected, found:" >&2
            printf '%s\n' "$native_entries" >&2
            exit 1
          fi
          apksigner="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f \
            -printf '%h\n' | sort -V | tail -1)/apksigner"
          "$apksigner" verify --verbose --print-certs "$APK"

      - name: Lint Android app
        if: matrix.abi == 'arm64-v8a'
        run: ./gradlew :app:lintRelease -Pyamu.abi=arm64-v8a

      - name: Upload APK and native build metadata
        uses: actions/upload-artifact@v7
        with:
          name: yamu-downloader-${{ matrix.abi }}
          path: |
            ${{ steps.build.outputs.apk }}
            ${{ steps.build.outputs.ffmpeg_config }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out Yamu Downloader source
        uses: actions/checkout@v7
        with:
          path: source/yamu-android
          fetch-depth: 0
          persist-credentials: false

      - name: Read pinned source metadata
        id: sources
        working-directory: source/yamu-android
        run: |
          ffmpeg_revision="$(tr -d '[:space:]' < vendor/ffmpeg-sys-next/FFMPEG_REVISION)"
          if [[ ! "$ffmpeg_revision" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid pinned FFmpeg revision: $ffmpeg_revision" >&2
            exit 1
          fi
          echo "ffmpeg=$ffmpeg_revision" >> "$GITHUB_OUTPUT"
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import re
          import tomllib

          with open("native/Cargo.lock", "rb") as lock_file:
              packages = tomllib.load(lock_file)["package"]
          matches = [
              package for package in packages
              if package["name"] == "yamu"
              and package.get("source", "").startswith("registry+")
          ]
          if len(matches) != 1:
              raise SystemExit("Cargo.lock must contain exactly one registry yamu package")
          package = matches[0]
          checksum = package.get("checksum", "")
          if not re.fullmatch(r"[0-9a-f]{64}", checksum):
              raise SystemExit("Cargo.lock contains an invalid yamu checksum")
          print(f"yamu_version={package['version']}")
          print(f"yamu_checksum={checksum}")
          PY

      - name: Fetch exact FFmpeg source
        working-directory: source
        env:
          FFMPEG_REVISION: ${{ steps.sources.outputs.ffmpeg }}
        run: |
          mkdir FFmpeg
          git -C FFmpeg init
          git -C FFmpeg remote add origin https://github.com/FFmpeg/FFmpeg
          git -C FFmpeg fetch --depth=1 origin "$FFMPEG_REVISION"
          git -C FFmpeg checkout --detach FETCH_HEAD
          test "$(git -C FFmpeg rev-parse HEAD)" = "$FFMPEG_REVISION"

      - name: Download APKs and build metadata
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: yamu-downloader-*
          merge-multiple: true

      - name: Create LGPL source archive
        env:
          YAMU_VERSION: ${{ steps.sources.outputs.yamu_version }}
          YAMU_CHECKSUM: ${{ steps.sources.outputs.yamu_checksum }}
          FFMPEG_REVISION: ${{ steps.sources.outputs.ffmpeg }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          bundle="yamu-downloader-$version-lgpl-sources"
          bundle_root="$RUNNER_TEMP/$bundle"
          mkdir -p "$bundle_root/BUILD-INFO" "$bundle_root/vendor"
          mv source/FFmpeg "$bundle_root/FFmpeg"
          cp -a source/yamu-android/vendor/ffmpeg-sys-next \
            "$bundle_root/vendor/ffmpeg-sys-next"
          cp -a source/yamu-android/vendor/mp3lame-sys \
            "$bundle_root/vendor/mp3lame-sys"
          cp -a source/yamu-android/LICENSES "$bundle_root/LICENSES"
          cp source/yamu-android/docs/RELINKING.md "$bundle_root/RELINKING.md"
          cp dist/ffmpeg-config-*.txt "$bundle_root/BUILD-INFO/"
          git -C "$bundle_root/FFmpeg" diff --binary \
            > "$bundle_root/BUILD-INFO/FFMPEG_CHANGES.diff"
          {
            printf 'YAMU_ANDROID_TAG=%s\n' "$GITHUB_REF_NAME"
            printf 'YAMU_ANDROID_REVISION=%s\n' "$GITHUB_SHA"
            printf 'YAMU_CRATE_VERSION=%s\n' "$YAMU_VERSION"
            printf 'YAMU_CRATE_SHA256=%s\n' "$YAMU_CHECKSUM"
            printf 'FFMPEG_REVISION=%s\n' "$FFMPEG_REVISION"
            printf 'LAME_VERSION=3.100\n'
          } > "$bundle_root/BUILD-INFO/SOURCES.txt"
          rm dist/ffmpeg-config-*.txt

          source_date_epoch="$(git -C source/yamu-android show -s --format=%ct HEAD)"
          tar \
            --sort=name \
            --mtime="@$source_date_epoch" \
            --owner=0 --group=0 --numeric-owner \
            -C "$RUNNER_TEMP" -cf - "$bundle" \
            | gzip -n > "dist/$bundle.tar.gz"

      - name: Create checksums
        run: |
          cd dist
          sha256sum -- *.apk *-lgpl-sources.tar.gz > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Yamu Downloader ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            dist/*.apk
            dist/*-lgpl-sources.tar.gz
            dist/SHA256SUMS
